<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simple Chat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff61ea">
</head>
<body>

    <div id="auth-container">
        <h2 id="auth-title">Welcome to Simple Chat</h2>
        <p style="opacity: 0.7; margin-bottom: 20px; font-size: 14px;">Sign in to start chatting</p>
        <button id="google-auth-btn" class="header-btn btn-primary" style="width: 100%; justify-content: center; display: flex; align-items: center; gap: 10px;">
            Login with Google
        </button>
    </div>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="user-profile">
                <span class="user-avatar">👤</span>
                <span id="user-display-name">Loading...</span>
            </div>
            <button id="close-sidebar" class="close-btn">&times;</button>
        </div>
        <div class="sidebar-content">
            <label class="sidebar-label">Active Chat Rooms</label>
            <div class="room-select-wrapper">
                <select id="room-select"></select>
            </div>
            
            <button id="open-manager-btn" class="sidebar-menu-btn">Manage Chats</button>
        </div>
        <div class="sidebar-footer">
            <button id="logout-btn" class="header-btn btn-secondary" style="width: 100%;">Logout</button>
        </div>
    </div>
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <div class="chat-container" id="main-chat-container" style="display: none;"> 
        <div class="chat-header"> 
            <div class="header-left">
                <button id="menu-toggle" class="icon-btn">☰</button>
                <h2 id="current-room-title" class="room-title">Chat</h2>
            </div>
            
            <div class="header-right">
                <button id="add-room-btn" class="header-btn btn-primary">New Chat</button>
            </div>
        </div>
        
    <div class="messages-box" id="messages-box"></div> 
        <div class="input-area"> 
            <input type="text" id="message-input" placeholder="Write a message..."> 
            <button id="send-btn" class="header-btn btn-primary">Send</button> 
        </div> 
    </div>

    <div id="chats-manager-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content manager-content">
            <h3>Chat Manager</h3>
            <p class="manager-subtitle">Manage your created chats here</p>
            
            <div id="manager-rooms-list" class="manager-list">
                </div>
            
            <div class="modal-buttons" style="margin-top: 20px;">
                <button id="close-manager-btn" class="header-btn btn-secondary">Close</button>
            </div>
        </div>
    </div>

    <div id="custom-confirm" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <p id="confirm-message">Are you sure?</p>
            <div class="modal-buttons">
                <button id="confirm-yes" class="header-btn btn-primary">Yes</button>
                <button id="confirm-no" class="header-btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <div id="custom-alert" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <p id="alert-message">Attention!</p>
            <div class="modal-buttons">
                <button id="alert-ok" class="header-btn btn-primary">OK</button>
            </div>
        </div>
    </div>

    <div id="custom-prompt" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 id="prompt-message" style="margin-bottom: 10px; font-size: 18px; color: #fff;">Create New Chat</h3>
            
            <input type="email" id="prompt-friend-email" placeholder="Friend's Email" style="margin-bottom: 10px;">
            <input type="text" id="prompt-room-name" placeholder="Chat Name (Optional, defaults to Username)">
            
            <div class="modal-buttons" style="margin-top: 15px;">
                <button id="prompt-save" class="header-btn btn-primary">Create</button>
                <button id="prompt-cancel" class="sidebar-menu-btn" style="background:#3d1d41;">Cancel</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
